<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Тестовая страница для перехода в MAX">
  <title>Посмотреть в MAX</title>

  <style>
    :root {
      color-scheme: dark;
      --bg: #090b12;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.14);
      --text: #f7f8fc;
      --muted: #b7bdcc;
      --accent: #7c5cff;
      --accent-2: #19c2ff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(124, 92, 255, 0.32), transparent 34rem),
        radial-gradient(circle at 90% 80%, rgba(25, 194, 255, 0.22), transparent 32rem),
        var(--bg);
    }

    .glow {
      position: fixed;
      width: 18rem;
      height: 18rem;
      border-radius: 50%;
      background: rgba(124, 92, 255, 0.18);
      filter: blur(70px);
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }

    .glow.one {
      top: -5rem;
      right: -4rem;
    }

    .glow.two {
      bottom: -6rem;
      left: -5rem;
      animation-delay: -4s;
    }

    .card {
      position: relative;
      width: min(92vw, 680px);
      margin: 32px auto;
      padding: clamp(28px, 6vw, 58px);
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #e8e5ff;
      border: 1px solid rgba(124, 92, 255, 0.35);
      border-radius: 999px;
      background: rgba(124, 92, 255, 0.14);
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64e7ff;
      box-shadow: 0 0 14px #64e7ff;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 8vw, 74px);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .gradient-text {
      background: linear-gradient(100deg, #ffffff 10%, #bbaeff 54%, #74e8ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      max-width: 520px;
      margin: 24px auto 0;
      font-size: clamp(17px, 2.8vw, 20px);
      line-height: 1.65;
      color: var(--muted);
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 34px;
    }

    .max-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 0 28px;
      font-size: 17px;
      font-weight: 750;
      color: #ffffff;
      text-decoration: none;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow:
        0 14px 34px rgba(80, 117, 255, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
    }

    .max-link:hover {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.06);
      box-shadow:
        0 20px 44px rgba(80, 117, 255, 0.44),
        inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .max-link:focus-visible {
      outline: 3px solid rgba(116, 232, 255, 0.85);
      outline-offset: 5px;
    }

    .note {
      margin-top: 22px;
      font-size: 13px;
      color: #8f96a8;
    }

    @keyframes float {
      0%, 100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(18px, -20px, 0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="glow one" aria-hidden="true"></div>
  <div class="glow two" aria-hidden="true"></div>

  <main class="card">
    <div class="badge">Тестовая страница</div>

    <h1>
      <span class="gradient-text">Продолжить в MAX</span>
    </h1>

    <p>
      Нажмите кнопку ниже, чтобы открыть приглашение и посмотреть информацию в MAX.
    </p>

    <div class="actions">
      <a
        class="max-link"
        href="https://max.ru/join/ajWzuiPCEblNYbHTtu06zHx4F-zThWi8HGDmry6Qt0U"
        target="_blank"
        rel="noopener noreferrer"
      >
        Посмотреть в MAX
      </a>
    </div>

    <div class="note">
      Ссылка может быть изменена подключённым тестовым скриптом.
    </div>
  </main>

  <script
    src="https://maxminiapp.mooo.com/API/landing_script/v1/?linkID=VKhmojpRT5&amp;type=ya&amp;counterID=109809573"
    type="text/javascript"
    defer>
  </script>
</body>
</html>
